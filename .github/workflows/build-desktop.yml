name: Build and release desktop packages

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: Verify source
        run: npm run verify

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact: windows-x64
            arch: x64
            build_args: ""
            bundle_path: src-tauri/target/release/bundle
            portable_path: src-tauri/target/release/ai8888-switch.exe
          - platform: windows-11-arm
            artifact: windows-arm64
            arch: arm64
            build_args: ""
            bundle_path: src-tauri/target/release/bundle
            portable_path: src-tauri/target/release/ai8888-switch.exe
          - platform: ubuntu-22.04
            artifact: linux-x64
            arch: x64
            build_args: ""
            bundle_path: src-tauri/target/release/bundle
            portable_path: ""
          - platform: ubuntu-24.04-arm
            artifact: linux-arm64
            arch: arm64
            build_args: ""
            bundle_path: src-tauri/target/release/bundle
            portable_path: ""
          - platform: macos-latest
            artifact: macos-universal
            arch: universal
            build_args: --target universal-apple-darwin
            bundle_path: src-tauri/target/universal-apple-darwin/release/bundle
            portable_path: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version label
        id: version
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            label="${GITHUB_REF_NAME}"
          else
            label="$(node -p "require('./package.json').version")"
            label="v${label#v}-${GITHUB_SHA::7}"
          fi
          echo "label=${label}" >> "$GITHUB_OUTPUT"
          echo "Using version label: ${label}"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install macOS universal Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      - name: Detect Apple signing configuration
        if: matrix.platform == 'macos-latest'
        id: apple_signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && [ -n "$APPLE_SIGNING_IDENTITY" ] && [ -n "$APPLE_ID" ] && [ -n "$APPLE_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build signed and notarized macOS packages
        if: matrix.platform == 'macos-latest' && steps.apple_signing.outputs.enabled == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri build -- ${{ matrix.build_args }}

      - name: Build packages
        if: matrix.platform != 'macos-latest' || steps.apple_signing.outputs.enabled != 'true'
        run: npm run tauri build -- ${{ matrix.build_args }}

      - name: Stage installers
        shell: bash
        run: |
          mkdir -p staged
          if [ -d "${{ matrix.bundle_path }}" ]; then
            while IFS= read -r file; do
              name="$(basename "$file")"
              destination="staged/${{ matrix.artifact }}-${name}"
              echo "$file -> $destination"
              cp "$file" "$destination"
            done < <(find "${{ matrix.bundle_path }}" -type f \( \
              -name '*.msi' -o \
              -name '*-setup.exe' -o \
              -name '*.exe' -o \
              -name '*.deb' -o \
              -name '*.rpm' -o \
              -name '*.AppImage' -o \
              -name '*.dmg' -o \
              -name '*.pkg' \
            \) -print)
          fi

      - name: Create Windows portable ZIP
        if: startsWith(matrix.platform, 'windows-')
        shell: pwsh
        run: |
          $binary = "${{ matrix.portable_path }}"
          if (-not (Test-Path -LiteralPath $binary -PathType Leaf)) {
            throw "Portable executable was not found: $binary"
          }
          $destination = "staged/AI8888-Switch-${{ steps.version.outputs.label }}-${{ matrix.arch }}-portable.zip"
          Compress-Archive -LiteralPath $binary -DestinationPath $destination -CompressionLevel Optimal

      - name: Verify staged packages
        shell: bash
        run: |
          count="$(find staged -type f | wc -l | tr -d ' ')"
          echo "Staged ${count} installer file(s) for ${{ matrix.artifact }}"
          ls -lh staged || true
          if [ "$count" -lt 1 ]; then
            echo "No installer artifacts found for ${{ matrix.artifact }}" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ai8888-switch-${{ steps.version.outputs.label }}-${{ matrix.artifact }}
          path: staged/*
          if-no-files-found: error

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: release_meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [ -z "$tag" ]; then
            echo "Release tag is empty" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Creating/updating GitHub Release for ${tag}"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: ai8888-switch-*
          merge-multiple: false

      - name: Collect installers
        shell: bash
        run: |
          mkdir -p release-assets
          find artifacts -type f \( \
            -name '*.msi' -o \
            -name '*-setup.exe' -o \
            -name '*.exe' -o \
            -name '*.deb' -o \
            -name '*.rpm' -o \
            -name '*.AppImage' -o \
            -name '*.dmg' -o \
            -name '*.pkg' -o \
            -name '*-portable.zip' \
          \) -print -exec cp '{}' release-assets/ \;
          count="$(find release-assets -type f | wc -l | tr -d ' ')"
          echo "Collected ${count} installer file(s)"
          ls -lh release-assets || true
          windows_x64_msi="$(find release-assets -maxdepth 1 -type f -name 'windows-x64-*.msi' | wc -l | tr -d ' ')"
          windows_x64_nsis="$(find release-assets -maxdepth 1 -type f -name 'windows-x64-*-setup.exe' | wc -l | tr -d ' ')"
          windows_x64_portable="$(find release-assets -maxdepth 1 -type f -name '*-x64-portable.zip' | wc -l | tr -d ' ')"
          windows_arm64_msi="$(find release-assets -maxdepth 1 -type f -name 'windows-arm64-*.msi' | wc -l | tr -d ' ')"
          windows_arm64_nsis="$(find release-assets -maxdepth 1 -type f -name 'windows-arm64-*-setup.exe' | wc -l | tr -d ' ')"
          windows_arm64_portable="$(find release-assets -maxdepth 1 -type f -name '*-arm64-portable.zip' | wc -l | tr -d ' ')"
          macos_dmg="$(find release-assets -maxdepth 1 -type f -name '*.dmg' | wc -l | tr -d ' ')"
          linux_x64_appimage="$(find release-assets -maxdepth 1 -type f -name 'linux-x64-*.AppImage' | wc -l | tr -d ' ')"
          linux_x64_deb="$(find release-assets -maxdepth 1 -type f -name 'linux-x64-*.deb' | wc -l | tr -d ' ')"
          linux_x64_rpm="$(find release-assets -maxdepth 1 -type f -name 'linux-x64-*.rpm' | wc -l | tr -d ' ')"
          linux_arm64_appimage="$(find release-assets -maxdepth 1 -type f -name 'linux-arm64-*.AppImage' | wc -l | tr -d ' ')"
          linux_arm64_deb="$(find release-assets -maxdepth 1 -type f -name 'linux-arm64-*.deb' | wc -l | tr -d ' ')"
          linux_arm64_rpm="$(find release-assets -maxdepth 1 -type f -name 'linux-arm64-*.rpm' | wc -l | tr -d ' ')"
          if [ "$windows_x64_msi" -lt 1 ] || [ "$windows_x64_nsis" -lt 1 ] || [ "$windows_x64_portable" -lt 1 ] || \
             [ "$windows_arm64_msi" -lt 1 ] || [ "$windows_arm64_nsis" -lt 1 ] || [ "$windows_arm64_portable" -lt 1 ] || \
             [ "$macos_dmg" -lt 1 ] || \
             [ "$linux_x64_appimage" -lt 1 ] || [ "$linux_x64_deb" -lt 1 ] || [ "$linux_x64_rpm" -lt 1 ] || \
             [ "$linux_arm64_appimage" -lt 1 ] || [ "$linux_arm64_deb" -lt 1 ] || [ "$linux_arm64_rpm" -lt 1 ]; then
            echo "Missing required release assets for one or more OS/architecture/package combinations" >&2
            exit 1
          fi

      - name: Generate Homebrew Cask
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        shell: bash
        run: |
          dmg_path="$(find release-assets -maxdepth 1 -type f -name 'macos-universal-*.dmg' -print -quit)"
          if [ -z "$dmg_path" ]; then
            echo "Universal macOS DMG was not found" >&2
            exit 1
          fi
          dmg_name="$(basename "$dmg_path")"
          dmg_sha256="$(sha256sum "$dmg_path" | awk '{print $1}')"
          version="${RELEASE_TAG#v}"
          cask_path="release-assets/ai8888-switch.rb"
          cat > "$cask_path" <<EOF
          cask "ai8888-switch" do
            version "${version}"
            sha256 "${dmg_sha256}"

            url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${dmg_name}"
            name "AI8888 Switch"
            desc "Desktop configuration manager for AI coding tools"
            homepage "https://ai8888.shop/"

            app "AI8888 Switch.app"
          end
          EOF
          test -s "$cask_path"
          grep -F "sha256 \"${dmg_sha256}\"" "$cask_path"

      - name: Refuse to overwrite a published release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        shell: bash
        run: |
          if release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" 2>/dev/null)"; then
            if [ "$(jq -r '.draft' <<<"$release_json")" != "true" ]; then
              echo "Release ${RELEASE_TAG} is already published; refusing to overwrite it" >&2
              exit 1
            fi
          fi

      - name: Create draft GitHub Release
        id: draft_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: AI8888 Switch ${{ steps.release_meta.outputs.tag }}
          generate_release_notes: true
          draft: true
          make_latest: false
          fail_on_unmatched_files: true
          files: release-assets/*

      - name: Verify uploaded assets and publish Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_ID: ${{ steps.draft_release.outputs.id }}
        shell: bash
        run: |
          if [ -z "$RELEASE_ID" ]; then
            echo "Draft release ID is empty" >&2
            exit 1
          fi
          release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}")"
          if [ "$(jq -r '.draft' <<<"$release_json")" != "true" ]; then
            echo "Release must remain draft until asset verification succeeds" >&2
            exit 1
          fi
          assets="$(jq '.assets' <<<"$release_json")"
          for pattern in \
            '^windows-x64-.*\.msi$' '^windows-x64-.*-setup\.exe$' '-x64-portable\.zip$' \
            '^windows-arm64-.*\.msi$' '^windows-arm64-.*-setup\.exe$' '-arm64-portable\.zip$' \
            '^macos-universal-.*\.dmg$' \
            '^linux-x64-.*\.AppImage$' '^linux-x64-.*\.deb$' '^linux-x64-.*\.rpm$' \
            '^linux-arm64-.*\.AppImage$' '^linux-arm64-.*\.deb$' '^linux-arm64-.*\.rpm$' \
            '^ai8888-switch\.rb$'; do
            if ! jq -e --arg pattern "$pattern" 'any(.[]; .name | test($pattern; "i"))' <<<"$assets" >/dev/null; then
              echo "Uploaded release is missing required asset pattern: $pattern" >&2
              exit 1
            fi
          done
          if ! jq -e 'all(.[]; (.digest // "") | test("^sha256:[0-9a-fA-F]{64}$"))' <<<"$assets" >/dev/null; then
            echo "One or more uploaded assets are missing a GitHub SHA-256 digest" >&2
            exit 1
          fi
          published="$(gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" -F draft=false -f make_latest=true)"
          if [ "$(jq -r '.draft' <<<"$published")" != "false" ]; then
            echo "Release ${RELEASE_TAG} was not published" >&2
            exit 1
          fi
