name: Publish release

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: Actions run containing desktop artifacts
        required: true
        type: string
      tag:
        description: Release tag
        required: true
        type: string

permissions:
  actions: read
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts

      - name: Collect installers
        shell: bash
        run: |
          mkdir release-assets
          find artifacts -type f \( \
            -name '*.msi' -o \
            -name '*-setup.exe' -o \
            -name '*.exe' -o \
            -name '*.deb' -o \
            -name '*.rpm' -o \
            -name '*.AppImage' -o \
            -name '*.dmg' -o \
            -name '*.pkg' \
          \) -exec cp '{}' release-assets/ \;
          count="$(find release-assets -type f | wc -l | tr -d ' ')"
          echo "Collected $count installer file(s)"
          ls -lh release-assets || true
          if [ "$count" -lt 1 ]; then
            echo "No installer artifacts found" >&2
            exit 1
          fi
          # Expect multi-platform packages when matrix builds all succeed.
          # Soft minimum keeps publish usable if one platform is temporarily missing.
          if [ "$count" -lt 3 ]; then
            echo "Warning: expected installers from multiple platforms, found only $count" >&2
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: master
          name: AI8888 Switch ${{ inputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*
